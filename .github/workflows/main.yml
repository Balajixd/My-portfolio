name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
```

**Step 4** → Click **"Commit changes"** → go to **Actions** tab → watch it run ✅

---

## If Step 2 Option Doesn't Appear

Your repo might be **private**. GitHub Pages with GitHub Actions only works on **public repos** for free accounts.

To fix → Go to:
```
https://github.com/Balajixd/My-portfolio/settings
```
Scroll all the way down → find **"Danger Zone"** → click **"Change visibility"** → set to **Public**

---

After all this your site will be live at:
```
https://balajixd.github.io/My-portfolio/
